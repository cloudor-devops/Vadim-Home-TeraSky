apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-info
  namespace: node-info
---
# ClusterRole (not Role): nodes are cluster-scoped resources.
# Least privilege: read-only, nodes only, no other resources or verbs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-info-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-info-node-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-info-node-reader
subjects:
  - kind: ServiceAccount
    name: node-info
    namespace: node-info
