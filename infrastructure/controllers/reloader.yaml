apiVersion: v1
kind: Namespace
metadata:
  name: reloader
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: stakater
  namespace: reloader
spec:
  interval: 1h
  url: https://stakater.github.io/stakater-charts
---
# Reloader: rolls pods when a Secret/ConfigMap they use changes.
# Needed because env vars are snapshotted at container start — a Secret
# updated by Flux (SOPS) or ESO is invisible to running pods until they
# restart. Reloader bumps a hash in the pod template, and the normal
# rolling update (maxUnavailable: 0) does the rest. Acts only on
# workloads annotated reloader.stakater.com/auto.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: reloader
  namespace: reloader
spec:
  interval: 30m
  timeout: 5m
  chart:
    spec:
      chart: reloader
      version: "2.x"
      sourceRef:
        kind: HelmRepository
        name: stakater
