apiVersion: v1
kind: Namespace
metadata:
  name: flagger-system
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: flagger
  namespace: flagger-system
spec:
  interval: 1h
  url: https://flagger.app
---
# Flagger (Flux family, CNCF): progressive delivery controller.
# meshProvider "kubernetes" = no service mesh required; blue/green is done
# by cloning the Deployment to <name>-primary and atomically switching the
# Service selector after analysis passes.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flagger
  namespace: flagger-system
spec:
  interval: 30m
  timeout: 5m
  chart:
    spec:
      chart: flagger
      version: "1.x"
      sourceRef:
        kind: HelmRepository
        name: flagger
  values:
    meshProvider: kubernetes
    # Bundled Prometheus scrapes pods annotated with prometheus.io/scrape
    # and backs the Canary analysis MetricTemplates.
    prometheus:
      install: true
