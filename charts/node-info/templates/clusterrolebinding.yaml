apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "node-info.clusterScopedName" . }}-node-reader
  labels:
    {{- include "node-info.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "node-info.clusterScopedName" . }}-node-reader
subjects:
  - kind: ServiceAccount
    name: {{ include "node-info.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
