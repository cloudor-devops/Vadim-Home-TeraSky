{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "node-info.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "node-info.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  # Allow eviction of pods that are Running but not Ready; without this,
  # unhealthy pods can block node drains indefinitely.
  unhealthyPodEvictionPolicy: AlwaysAllow
  selector:
    matchLabels:
      {{- include "node-info.selectorLabels" . | nindent 6 }}
{{- end }}
