# ClusterRole (not Role): nodes are cluster-scoped.
# Least privilege: read-only, nodes only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "node-info.clusterScopedName" . }}-node-reader
  labels:
    {{- include "node-info.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
