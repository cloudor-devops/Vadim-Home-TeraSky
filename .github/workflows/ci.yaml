# CI: test -> build -> scan -> push -> bump dev manifest.
# CI never talks to the cluster: it only pushes images and commits the new
# dev tag to Git. Flux picks the change up from there (GitOps boundary).
#
# The push trigger's paths filter deliberately excludes apps/** so the
# CI-authored dev bump commit cannot retrigger the pipeline.
name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "Dockerfile"
      - "charts/**"
      - ".github/workflows/**"

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/node-info

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Unit tests
        run: |
          pip install -r app/requirements-dev.txt
          cd app && python -m pytest tests -v
      - name: Helm lint and render
        run: |
          helm lint charts/node-info -f charts/node-info/values-dev.yaml
          mkdir -p rendered
          for e in dev staging production; do
            helm template node-info charts/node-info -n node-info-$e \
              -f charts/node-info/values-$e.yaml > rendered/$e.yaml
          done
      - name: kube-linter on rendered manifests
        run: |
          curl -sSLo kube-linter.tar.gz https://github.com/stackrox/kube-linter/releases/latest/download/kube-linter-linux.tar.gz
          tar -xzf kube-linter.tar.gz
          ./kube-linter lint rendered/

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - name: Build image (local, for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ env.IMAGE }}:${{ steps.vars.outputs.tag }}
      - name: Trivy scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.vars.outputs.tag }}
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.vars.outputs.tag }}

  deploy-dev:
    # "Deploy" = commit the new tag for the dev overlay. Flux does the rest.
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Bump dev image tag
        run: |
          sed -i -E "s|tag: sha-[0-9a-f]+|tag: ${{ needs.build.outputs.tag }}|" apps/dev/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(dev): deploy ${{ needs.build.outputs.tag }}"
          git push
