# Entry point for the staging cluster: reconciles everything under apps/staging.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-policies
  interval: 5m
  path: ./apps/staging
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  # SOPS decryption: private age key lives only in this cluster,
  # created out-of-band at bootstrap (never in Git).
  decryption:
    provider: sops
    secretRef:
      name: sops-age
