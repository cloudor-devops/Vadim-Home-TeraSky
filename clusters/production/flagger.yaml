# Blue/green delivery add-on for the production cluster.
# Referenced only from this cluster path: the local demo cluster
# (clusters/dev) does not install Flagger.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-flagger
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-controllers
  interval: 10m
  path: ./infrastructure/flagger
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-flagger
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-flagger
    - name: apps
  interval: 5m
  path: ./apps/production/flagger
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
