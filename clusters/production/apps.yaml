# Entry point for the production EKS cluster (provisioned via infra/terraform,
# production.tfvars). Activated by:
#   flux bootstrap github --owner=cloudor-devops --repository=Vadim-Home-TeraSky \
#     --branch=main --path=clusters/production --token-auth
# The sops-age secret below holds the PRODUCTION age key (see .sops.yaml),
# created out-of-band before bootstrap.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-policies
  interval: 5m
  path: ./apps/production
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  # SOPS decryption: private age key lives only in this cluster,
  # created out-of-band at bootstrap (never in Git).
  decryption:
    provider: sops
    secretRef:
      name: sops-age
