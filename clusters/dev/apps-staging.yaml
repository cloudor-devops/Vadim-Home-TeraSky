# Local demo: all three environments run on this cluster as namespaces.
# In a real deployment each env is its own cluster bootstrapped to
# clusters/staging (same overlays; see clusters/staging/).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps-staging
  namespace: flux-system
spec:
  dependsOn:
    - name: infra-policies
  interval: 5m
  path: ./apps/staging
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  # Per-env decryption key: staging secrets can only be decrypted by the
  # staging key even on a shared demo cluster.
  decryption:
    provider: sops
    secretRef:
      name: sops-age-staging
