# "What to sync": pulls staging/node-info from Secrets Manager into the
# Secret the app already consumes (same name, same envFrom — no app
# change). Refreshed every minute; a rotation in AWS lands here without
# any Git commit. Reloader then rolls the pods.
#
# MIGRATION NOTE: enabling this replaces the SOPS-managed Secret. Remove
# node-info-secrets.enc.yaml from apps/staging/kustomization.yaml in the
# same change — two owners of one Secret is a fight, not a handover.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: node-info-secrets
spec:
  refreshInterval: 1m
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: node-info-secrets
    creationPolicy: Owner
  data:
    - secretKey: API_TOKEN
      remoteRef:
        key: staging/node-info
        property: API_TOKEN
