apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: node-info-staging
resources:
  - namespace.yaml
  - ../base/node-info
patches:
  - patch: |
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: node-info
      spec:
        chart:
          spec:
            valuesFiles:
              - charts/node-info/values.yaml
              - charts/node-info/values-staging.yaml
