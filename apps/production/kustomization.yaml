apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: node-info-production
resources:
  - namespace.yaml
  - ../base/node-info
patches:
  - patch: |
      apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      metadata:
        name: node-info
      spec:
        chart:
          spec:
            valuesFiles:
              - charts/node-info/values.yaml
              - charts/node-info/values-production.yaml
        values:
          image:
            repository: ghcr.io/cloudor-devops/node-info
            # Promoted by PR: copy the tag verified in staging.
            tag: sha-0000000
            pullSecrets:
              - name: ghcr-pull
